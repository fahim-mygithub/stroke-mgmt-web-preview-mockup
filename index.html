  setBreadcrumb('');
  setTopbar('Article');
  const found = state.articles.find((a) => a.id === id);
  if (!found) { errorFrame('Article not found.'); return; }
  const att = found.attributes;
  const tag = (att.tags?.data || [])[0]?.attributes?.Name || 'Article';
  const lastUpdated = att.updatedAt ? new Date(att.updatedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) : '';

  viewFrame(`
    <div class="article-reader">
      <span class="tag">${esc(tag)}</span>
      <h1>${esc(decodeEntities(att.Title))}</h1>
      <div class="article-meta">
        ${att.Summary ? `<span>${esc(decodeEntities(att.Summary))}</span><span>·</span>` : ''}
        <span>Updated ${lastUpdated}</span>
      </div>
      <div>${att.Body || ''}</div>
    </div>
  `);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ---------- Scroll helper ---------- */
function smoothScrollTo(targetY, duration) {
  const startY = window.scrollY;
  const delta = targetY - startY;
  if (Math.abs(delta) < 2) return;
  const startT = performance.now();
  function step(now) {
    const t = Math.min(1, (now - startT) / duration);
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    window.scrollTo(0, startY + delta * eased);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function scrollExpandedIntoView(card) {
  const topbarH = document.querySelector('.topbar').getBoundingClientRect().height;
  const vh = window.innerHeight;
  setTimeout(() => {
    const rect = card.getBoundingClientRect();
    let target = null;
    if (rect.bottom > vh - 16) target = window.scrollY + (rect.bottom - vh) + 24;
    else if (rect.top < topbarH + 12) target = window.scrollY + rect.top - topbarH - 12;
    if (target != null) {
      const max = document.documentElement.scrollHeight - vh;
      target = Math.max(0, Math.min(target, max));
      smoothScrollTo(target, 360);
    }
  }, 300);
}

/* ================================================================
   Topbar menu popover
   ================================================================ */

const MENU_ITEMS = [
  { label: 'Intro',       onClick: () => goToIntro({ force: true }) },
  { label: 'Disclaimer',  onClick: () => goToDisclaimer({ review: true }) },
  { label: 'License',     onClick: () => goToLicense() },
  { label: 'Refresh',     onClick: () => doRefresh() },
  { label: 'Clear Cache', onClick: () => doClearCache() },
  { label: 'About',       onClick: () => goToAbout() },
];

function buildMenu() {
  const menu = $('topbarMenu');
  menu.innerHTML = MENU_ITEMS.map((m, i) =>
    `<button class="menu-item" role="menuitem" data-menu-idx="${i}">${esc(m.label)}</button>`
  ).join('');
  menu.querySelectorAll('.menu-item').forEach((btn) => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.menuIdx;
      closeMenu();
      const item = MENU_ITEMS[idx];
      if (item) item.onClick();
    });
  });
}

function openMenu() {
  const menu = $('topbarMenu');
  const btn = $('menuBtn');
  menu.classList.add('open');
  btn.setAttribute('aria-expanded', 'true');
  setTimeout(() => {
    document.addEventListener('click', _menuOutsideClick);
    document.addEventListener('keydown', _menuKeydown);
  }, 0);
}
function closeMenu() {
  const menu = $('topbarMenu');
  const btn = $('menuBtn');
  menu.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');
  document.removeEventListener('click', _menuOutsideClick);
  document.removeEventListener('keydown', _menuKeydown);
}
function _menuOutsideClick(e) {
  const menu = $('topbarMenu');
  const btn = $('menuBtn');
  if (menu.contains(e.target) || btn.contains(e.target)) return;
  closeMenu();
}
function _menuKeydown(e) {
  if (e.key === 'Escape') closeMenu();
}

/* ================================================================
   Disclaimer modal
   ================================================================ */

const DISCLAIMER_FALLBACK = `
  <p>This application is a clinical decision-support tool intended for use by
  qualified medical professionals. It does not replace clinical judgment.
  Treatment decisions should always be made in the context of a complete
  patient evaluation.</p>
  <p>Information presented here is provided for educational purposes and may
  not reflect the most current evidence at any given moment. Always verify
  protocols against your institution's standards of care before acting on
  any recommendation.</p>
`;

let _disclaimerLastFocus = null;
let _disclaimerCache = null;

async function fetchDisclaimerBody() {
  if (_disclaimerCache != null) return _disclaimerCache;
  try {
    const json = await fetchJson(`${CMS}/api/disclaimer?populate=*`);
    const body = json?.data?.attributes?.Body;
    _disclaimerCache = body || DISCLAIMER_FALLBACK;
  } catch {
    _disclaimerCache = DISCLAIMER_FALLBACK;
  }
  return _disclaimerCache;
}

async function goToDisclaimer(opts = {}) {
  const review = !!opts.review;
  const body = await fetchDisclaimerBody();
  renderDisclaimerModal(body, { review, onAccept: opts.onAccept });
}

function renderDisclaimerModal(bodyHtml, opts = {}) {
  closeDisclaimerModal(); // ensure single instance
  _disclaimerLastFocus = document.activeElement;
  const review = !!opts.review;
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.id = 'disclaimerModal';
  wrap.setAttribute('role', 'dialog');
  wrap.setAttribute('aria-modal', 'true');
  wrap.setAttribute('aria-labelledby', 'disclaimerTitle');
  wrap.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="disclaimerTitle">Disclaimer</h2>
        ${review ? `
          <button class="modal-close" id="disclaimerCloseBtn" aria-label="Close disclaimer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        ` : ''}
      </div>
      <div class="modal-body article-reader">${bodyHtml}</div>
      ${review ? '' : `
        <div class="modal-foot">
          <button class="btn btn-primary" id="disclaimerAcceptBtn">I understand</button>
        </div>
      `}
    </div>
  `;
  document.body.appendChild(wrap);

  if (!review) {
    const accept = $('disclaimerAcceptBtn');
    accept.addEventListener('click', () => {
      lsSet('disclaimer:accepted', 'true');
      closeDisclaimerModal();
      if (opts.onAccept) opts.onAccept();
    });
    setTimeout(() => accept.focus(), 0);
  } else {
    const close = $('disclaimerCloseBtn');
    close.addEventListener('click', closeDisclaimerModal);
    wrap.addEventListener('click', (e) => {
      if (e.target === wrap) closeDisclaimerModal();
    });
    document.addEventListener('keydown', _disclaimerEscClose);
    setTimeout(() => close.focus(), 0);
  }
}

function _disclaimerEscClose(e) {
  if (e.key === 'Escape') closeDisclaimerModal();
}

function closeDisclaimerModal() {
  const m = document.getElementById('disclaimerModal');
  if (!m) return;
  m.remove();
  document.removeEventListener('keydown', _disclaimerEscClose);
  if (_disclaimerLastFocus && document.body.contains(_disclaimerLastFocus)) {
    _disclaimerLastFocus.focus();
  }
  _disclaimerLastFocus = null;
}

/* ================================================================
   Intro slideshow
   ================================================================ */

let _introState = null;
let _introLastFocus = null;

async function fetchIntroSequence() {
  const url = `${CMS}/api/intro-sequence?populate[articles][fields][0]=id&populate[suggestedAlgorithm][fields][0]=id`;
  const json = await fetchJson(url);
  const articles = json?.data?.attributes?.articles?.data || [];
  return articles.map((a) => a.id);
}

async function fetchArticleFull(id) {
  const cached = state.articles.find((a) => a.id === id);
  if (cached && cached.attributes?.Body) return cached;
  const json = await fetchJson(`${CMS}/api/articles/${id}?populate=*`);
  return json.data;
}

async function goToIntro(opts = {}) {
  const force = !!opts.force;
  if (!force && lsGet('intro:hideOnLaunch') === 'true') {
    return false;
  }
  let ids;
  try {
    ids = await fetchIntroSequence();
  } catch (e) {
    showToast(`Couldn't load intro: ${e.message}`);
    return false;
  }
  if (!ids.length) return false;

  _introState = {
    articleIds: ids,
    articles: new Array(ids.length).fill(null),
    errors: new Array(ids.length).fill(null),
    index: 0,
  };
  renderIntroShell();
  loadIntroSlide(0);
  // Prefetch next slide for snappy transitions.
  if (ids.length > 1) loadIntroSlide(1);
  return true;
}

function renderIntroShell() {
  closeIntro();
  _introLastFocus = document.activeElement;
  const wrap = document.createElement('div');
  wrap.className = 'intro-backdrop';
  wrap.id = 'introSlideshow';
  wrap.setAttribute('role', 'dialog');
  wrap.setAttribute('aria-modal', 'true');
  wrap.setAttribute('aria-label', 'Introduction');
  wrap.innerHTML = `
    <div class="intro-card">
      <div class="intro-head">
        <div class="intro-dots" id="introDots" role="tablist" aria-label="Slides"></div>
        <span class="intro-count" id="introCount"></span>
        <button class="intro-skip" id="introSkipBtn" aria-label="Skip introduction">Skip</button>
      </div>
      <div class="intro-body">
        <div class="intro-track" id="introTrack"></div>
      </div>
      <div class="intro-foot" id="introFoot"></div>
    </div>
  `;
  document.body.appendChild(wrap);

  $('introSkipBtn').addEventListener('click', () => closeIntro({ goHome: true }));
  document.addEventListener('keydown', _introKeydown);
  _introWireSwipe();

  renderIntroProgress();
  renderIntroSlides();
  renderIntroFoot();
  setTimeout(() => $('introSkipBtn').focus(), 0);
}

function renderIntroProgress() {
  if (!_introState) return;
  const { articleIds, index } = _introState;
  const dots = articleIds.map((_, i) => {
    const cls = i === index ? 'active' : (i < index ? 'done' : '');
    return `<span class="intro-dot ${cls}" ${i === index ? 'aria-current="true"' : ''} role="tab" aria-label="Slide ${i + 1}"></span>`;
  }).join('');
  const dotsEl = $('introDots');
  if (dotsEl) dotsEl.innerHTML = dots;
  const count = $('introCount');
  if (count) count.textContent = `${index + 1} of ${articleIds.length}`;
}

function renderIntroSlides() {
  if (!_introState) return;
  const track = $('introTrack');
  if (!track) return;
  track.innerHTML = _introState.articleIds.map((_, i) =>
    `<section class="intro-slide" data-slide-idx="${i}" aria-hidden="${i === _introState.index ? 'false' : 'true'}"><div class="intro-loading loading"><div class="spinner"></div>Loading…</div></section>`
  ).join('');
  applyIntroTransform(false);
  // Render any already-loaded slides immediately.
  _introState.articleIds.forEach((_, i) => {
    if (_introState.articles[i] || _introState.errors[i]) renderIntroSlideContent(i);
  });
}

function applyIntroTransform(animated) {
  const track = $('introTrack');
  if (!track) return;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  track.style.transition = (animated && !reduce) ? '' : 'none';
  track.style.transform = `translateX(-${_introState.index * 100}%)`;
  if (!animated || reduce) {
    // Force reflow then restore default transition for next move.
    void track.offsetWidth;
    track.style.transition = '';
  }
}

function renderIntroSlideContent(i) {
  if (!_introState) return;
  const slide = document.querySelector(`.intro-slide[data-slide-idx="${i}"]`);
  if (!slide) return;
  const err = _introState.errors[i];
  if (err) {
    slide.innerHTML = `
      <div class="intro-error">
        <p>Couldn't load this slide.</p>
        <p style="font-size:13px;color:var(--ink-3);">${esc(err)}</p>
        <button class="btn btn-ghost" data-intro-retry="${i}">Retry</button>
      </div>
    `;
    slide.querySelector('[data-intro-retry]').addEventListener('click', () => {
      _introState.errors[i] = null;
      renderIntroSlideContent(i);
      slide.innerHTML = `<div class="intro-loading loading"><div class="spinner"></div>Loading…</div>`;
      loadIntroSlide(i);
    });
    return;
  }
  const art = _introState.articles[i];
  if (!art) return;
  const att = art.attributes || {};
  const tag = (att.tags?.data || [])[0]?.attributes?.Name || 'Intro';
  const hero = thumbUrl(att) || placeholderThumb(art.id, 'intro');
  const title = decodeEntities(att.Title || '');
  slide.innerHTML = `
    <img class="intro-hero" src="${hero}" alt="" decoding="async">
    <div class="intro-content">
      <div class="article-reader">
        <span class="tag">${esc(tag)}</span>
        <h1>${esc(title)}</h1>
        <div>${att.Body || ''}</div>
      </div>
    </div>
  `;
}

async function loadIntroSlide(i) {
  if (!_introState) return;
  if (_introState.articles[i] || _introState.errors[i]) return;
  const id = _introState.articleIds[i];
  try {
    const art = await fetchArticleFull(id);
    if (!_introState) return;
    _introState.articles[i] = art;
    renderIntroSlideContent(i);
  } catch (e) {
    if (!_introState) return;
    _introState.errors[i] = e.message || 'Network error';
    renderIntroSlideContent(i);
  }
}

function renderIntroFoot() {
  if (!_introState) return;
  const foot = $('introFoot');
  if (!foot) return;
  const { articleIds, index } = _introState;
  const isLast = index === articleIds.length - 1;
  const isFirst = index === 0;
  foot.innerHTML = `
    ${isLast ? `
      <label class="checkbox-row">
        <input type="checkbox" id="introHideChk" ${lsGet('intro:hideOnLaunch') === 'true' ? 'checked' : ''}>
        Don't show again
      </label>
    ` : '<span></span>'}
    <div class="intro-nav">
      ${isFirst ? '' : `<button class="btn btn-ghost" id="introPrevBtn">Previous</button>`}
      <button class="btn btn-primary" id="introNextBtn">${isLast ? 'Get Started' : 'Next →'}</button>
    </div>
  `;
  const next = $('introNextBtn');
  const prev = $('introPrevBtn');
  if (next) next.addEventListener('click', introAdvance);
  if (prev) prev.addEventListener('click', introBack);
}

function introAdvance() {
  if (!_introState) return;
  const { articleIds, index } = _introState;
  const isLast = index === articleIds.length - 1;
  if (isLast) {
    const chk = $('introHideChk');
    if (chk?.checked) lsSet('intro:hideOnLaunch', 'true');
    closeIntro({ goHome: true });
    return;
  }
  _introState.index = index + 1;
  renderIntroProgress();
  applyIntroTransform(true);
  renderIntroFoot();
  // Mark slides for accessibility + prefetch the new "next" slide.
  document.querySelectorAll('.intro-slide').forEach((s) => {
    s.setAttribute('aria-hidden', +s.dataset.slideIdx === _introState.index ? 'false' : 'true');
  });
  if (_introState.index + 1 < articleIds.length) loadIntroSlide(_introState.index + 1);
  loadIntroSlide(_introState.index);
}

function introBack() {
  if (!_introState) return;
  if (_introState.index === 0) return;
  _introState.index -= 1;
  renderIntroProgress();
  applyIntroTransform(true);
  renderIntroFoot();
  document.querySelectorAll('.intro-slide').forEach((s) => {
    s.setAttribute('aria-hidden', +s.dataset.slideIdx === _introState.index ? 'false' : 'true');
  });
}

function _introKeydown(e) {
  if (!_introState) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); introAdvance(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); introBack(); }
  else if (e.key === 'Escape') { e.preventDefault(); closeIntro({ goHome: true }); }
}

function _introWireSwipe() {
  const body = document.querySelector('.intro-body');
  if (!body) return;
  let startX = 0, startY = 0, tracking = false, locked = false;
  body.addEventListener('pointerdown', (e) => {
    tracking = true; locked = false;
    startX = e.clientX; startY = e.clientY;
  });
  body.addEventListener('pointermove', (e) => {
    if (!tracking) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (!locked && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      // Lock to whichever axis dominates so vertical scroll inside the slide
      // body keeps working without triggering a slide change.
      locked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
    }
  });
  body.addEventListener('pointerup', (e) => {
    if (!tracking) return;
    const dx = e.clientX - startX;
    if (locked === 'x' && Math.abs(dx) >= 40) {
      if (dx < 0) introAdvance();
      else introBack();
    }
    tracking = false; locked = false;
  });
  body.addEventListener('pointercancel', () => { tracking = false; locked = false; });
}

function closeIntro(opts = {}) {
  const el = document.getElementById('introSlideshow');
  if (el) el.remove();
  document.removeEventListener('keydown', _introKeydown);
  _introState = null;
  if (_introLastFocus && document.body.contains(_introLastFocus)) {
    _introLastFocus.focus();
  }
  _introLastFocus = null;
  if (opts.goHome) {
    if (state.view !== 'home') renderHome();
  }
}

/* ================================================================
   Refresh + Clear Cache actions
   ================================================================ */

async function doRefresh() {
  state.algoCache = {};
  state.homeAlgos = [];
  state.articles = [];
  state.placeholderImages = [];
  _aboutCache = null;
  _disclaimerCache = null;
  try {
    const [algos, arts, phImgs] = await Promise.all([
      loadHomeAlgorithms(),
      loadAllArticles(),
      loadPlaceholderImages().catch(() => []),
    ]);
    state.homeAlgos = algos;
    state.articles = arts;
    state.placeholderImages = phImgs;
    for (const a of algos) state.algoCache[a.id] = a;
    if (state.view === 'home') renderHome();
    showToast('Refreshed.');
  } catch (e) {
    showToast('Refresh failed — check connection.');
  }
}

function doClearCache() {
  lsClear();
  showToast('Cache cleared. Reload to start fresh.', {
    actionLabel: 'Reload',
    onAction: () => location.reload(),
    durationMs: 6000,
  });
}

/* ================================================================
   Boot dispatcher — disclaimer first, then intro, then home
   ================================================================ */

async function boot() {
  // Wire the menu button + build menu items once.
  buildMenu();
  $('menuBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    const menu = $('topbarMenu');
    if (menu.classList.contains('open')) closeMenu();
    else openMenu();
  });

  // Always start by rendering home so it's behind any modals.
  await renderHome();

  // First-visit flow: disclaimer -> intro -> home.
  const disclaimerAccepted = lsGet('disclaimer:accepted') === 'true';
  if (!disclaimerAccepted) {
    const body = await fetchDisclaimerBody();
    renderDisclaimerModal(body, {
      review: false,
      onAccept: () => maybeAutoLaunchIntro(),
    });
  } else {
    maybeAutoLaunchIntro();
  }
}

function maybeAutoLaunchIntro() {
  if (lsGet('intro:hideOnLaunch') === 'true') return;
  goToIntro({ force: false });
}

/* ---------- Boot ---------- */
boot();
