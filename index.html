<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no" />
<meta name="theme-color" content="#1E4E8C" />
<title>Stroke Mgmt — Design Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
<style>
:root {
  --canvas: #F7F5F2;
  --surface: #FFFFFF;
  --surface-2: #FAFBFC;
  --ink: #0B1220;
  --ink-2: #475467;
  --ink-3: #667085;
  --border: #E4E7EB;
  --border-2: #EEF0F3;
  --brand: #1E4E8C;
  --brand-hover: #163B6E;
  --brand-soft: #EAF0F8;
  --brand-softer: #F3F7FB;
  --accent: #0891B2;

  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-pill: 999px;
  --shadow-xs: 0 1px 2px rgba(16,24,40,.04);
  --shadow-sm: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.04);
  --shadow-md: 0 4px 8px -2px rgba(16,24,40,.06), 0 2px 4px -2px rgba(16,24,40,.04);
  --shadow-lg: 0 12px 24px -6px rgba(16,24,40,.10), 0 4px 8px -2px rgba(16,24,40,.05);

  --spring: cubic-bezier(.22,1.36,.36,1);
  --ease: cubic-bezier(.2,.8,.2,1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--canvas); color: var(--ink); font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
html { overflow-x: clip; }
body { min-height: 100vh; }
a { color: var(--brand); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }
:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px; }

.topbar { position: sticky; top: 0; z-index: 20; background: rgba(247,245,242,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-2); }
.topbar-inner { max-width: 1280px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
.brand { font-weight: 700; font-size: 15px; color: var(--ink); letter-spacing: -0.01em; display: flex; align-items: center; gap: 10px; }
.brand-dot { width: 22px; height: 22px; border-radius: 6px; background: var(--brand); position: relative; }
.brand-dot::after { content: ''; position: absolute; inset: 6px; border-radius: 2px; background: #fff; clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }
.topbar .spacer { flex: 1; }
.icon-btn { width: 36px; height: 36px; border-radius: var(--r-md); border: 1px solid var(--border); background: var(--surface); display: grid; place-items: center; color: var(--ink-2); transition: all 140ms var(--ease); }
.icon-btn:hover { background: var(--surface-2); color: var(--ink); }
.icon-btn:active { transform: scale(.96); }
.back-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px 6px 8px; border: 1px solid var(--border); background: var(--surface); color: var(--ink-2); border-radius: var(--r-md); font-weight: 500; font-size: 13px; transition: all 140ms var(--ease); }
.back-btn:hover { background: var(--surface-2); color: var(--ink); }
.topbar-title { font-weight: 600; font-size: 14px; color: var(--ink); letter-spacing: -0.01em; }

.shell { max-width: 1280px; margin: 0 auto; padding: 24px; }

.view { animation: viewIn 260ms var(--ease) both; }
@keyframes viewIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.eyebrow { text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; font-weight: 600; color: var(--ink-3); margin-bottom: 8px; }
.section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); margin: 0 0 4px 0; }
.section-sub { color: var(--ink-2); font-size: 14px; margin: 0 0 20px 0; }

.pathways { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-bottom: 24px; }
@media (max-width: 720px) {
  .pathways {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 78%;
    grid-template-columns: none;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    padding: 4px 24px 12px;
    margin-left: -24px;
    margin-right: -24px;
    scrollbar-width: none;
  }
  .pathways::-webkit-scrollbar { display: none; }
  .pathway-card { scroll-snap-align: start; }
}
.pathway-card { position: relative; display: block; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 0; overflow: hidden; box-shadow: var(--shadow-xs); transition: all 180ms var(--ease); cursor: pointer; text-align: left; font: inherit; color: inherit; width: 100%; }
.pathway-thumb { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: var(--surface-2); border-bottom: 1px solid var(--border-2); }
.pathway-card-body { padding: 20px; position: relative; }
.pathway-card:hover { border-color: var(--brand); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.pathway-card:active { transform: translateY(0) scale(.995); }
.pathway-card .eyebrow { color: var(--brand); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.pathway-card h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); margin: 0 0 6px 0; }
.pathway-card p { font-size: 13.5px; color: var(--ink-2); margin: 0; }
.pathway-card .arrow { position: absolute; top: 20px; right: 20px; width: 28px; height: 28px; display: grid; place-items: center; color: var(--ink-3); transition: all 180ms var(--ease); }
.pathway-card:hover .arrow { color: var(--brand); transform: translateX(2px); }
.pathway-card .meta { display: flex; gap: 10px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-2); font-size: 12px; color: var(--ink-3); }
.pathway-card .meta span { display: inline-flex; align-items: center; gap: 4px; }

.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chip { padding: 7px 14px; border-radius: var(--r-pill); border: 1px solid var(--border); background: var(--surface); color: var(--ink-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 140ms var(--ease); }
.chip:hover { border-color: var(--ink-3); color: var(--ink); }
.chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.articles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 960px) { .articles { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .articles { grid-template-columns: 1fr; } }
.article-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 0; overflow: hidden; transition: all 180ms var(--ease); cursor: pointer; text-align: left; font: inherit; color: inherit; display: flex; flex-direction: column; }
.article-thumb { display: block; width: 100%; aspect-ratio: 21 / 9; object-fit: cover; background: var(--surface-2); border-bottom: 1px solid var(--border-2); }
.article-card-body { padding: 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.article-card:hover { border-color: var(--ink-3); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.article-card .tag { font-size: 11px; font-weight: 600; color: var(--brand); text-transform: uppercase; letter-spacing: 0.06em; }
.article-card h4 { margin: 0; font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.35; letter-spacing: -0.005em; }
.article-card p { margin: 0; font-size: 13px; color: var(--ink-2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.article-card .read { margin-top: auto; padding-top: 8px; font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 4px; }
.home-sep { height: 1px; background: var(--border-2); border: 0; margin: 32px 0 24px 0; }

.algo-header { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-2); }
.algo-header .eyebrow { color: var(--brand); }
.algo-title { font-size: 28px; font-weight: 700; letter-spacing: -0.025em; color: var(--ink); margin: 0 0 8px 0; line-height: 1.2; }
.algo-sub { color: var(--ink-2); font-size: 15px; margin: 0; max-width: 68ch; }
@media (max-width: 560px) { .algo-title { font-size: 22px; } }

.algo-body { font-size: 14.5px; color: var(--ink); line-height: 1.65; margin-bottom: 28px; }
.algo-body p { margin: 0 0 10px 0; }
.algo-body strong { font-weight: 600; color: var(--ink); }
.algo-body ul { padding-left: 22px; margin: 10px 0; }
.algo-body li { margin-bottom: 4px; }
.algo-body h1,.algo-body h2,.algo-body h3 { font-weight: 700; letter-spacing: -0.015em; margin: 18px 0 8px 0; }
.algo-body h1 { font-size: 20px; }
.algo-body h2 { font-size: 17px; }
.algo-body h3 { font-size: 15px; }

.switches { display: grid; gap: 12px; margin-bottom: 24px; }
.switch-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 16px; transition: all 180ms var(--ease); }
.switch-row .label-line { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.switch-row .label-line .lbl { font-size: 14px; font-weight: 600; color: var(--ink); }
.switch-row .info-toggle {
  background: transparent; border: 0; padding: 0; margin: 0;
  color: var(--ink-3); font-size: 16px; line-height: 1;
  cursor: pointer; transition: color 140ms var(--ease);
  display: inline-flex; align-items: center;
  position: relative;
}
.switch-row .info-toggle::before {
  content: ''; position: absolute; inset: -10px;
}
.switch-row .info-toggle:hover { color: var(--ink); }
.switch-row .info-toggle[aria-expanded="true"] { color: var(--brand); }
.switch-row .info-toggle:focus-visible {
  outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 4px;
}

.switch-row .desc-wrap {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 240ms var(--ease);
  margin-top: 0;
}
.switch-row.desc-open .desc-wrap {
  grid-template-rows: 1fr;
  margin-top: 8px;
}
.switch-row .desc-inner { overflow: hidden; }
.switch-row .desc {
  margin: 0 0 10px 0;
  font-size: 12.5px;
  color: var(--ink-3);
  line-height: 1.5;
}
.switch-row .desc p { margin: 0 0 6px 0; }
.switch-row .desc p:last-child { margin-bottom: 0; }
.level-row { display: flex; gap: 6px; flex-wrap: wrap; }
.level-btn { padding: 8px 14px; border-radius: var(--r-md); border: 1px solid var(--border); background: var(--surface); color: var(--ink-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 140ms var(--ease); min-width: 44px; text-align: center; }
.level-btn:hover { border-color: var(--ink-3); color: var(--ink); }
.level-btn.selected { background: var(--brand); border-color: var(--brand); color: #fff; box-shadow: 0 0 0 3px var(--brand-soft); }
.level-btn:active { transform: scale(.96); }

.score-bar { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 16px 20px; background: var(--ink); color: #fff; border-radius: var(--r-md); margin-bottom: 28px; box-shadow: var(--shadow-sm); }
.score-bar .score-label { display: flex; flex-direction: column; gap: 2px; }
.score-bar .score-label .eyebrow { color: rgba(255,255,255,.6); margin: 0; }
.score-bar .score-label .name { font-size: 14px; font-weight: 500; color: rgba(255,255,255,.9); }
.score-bar .score-val { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; transition: color 180ms var(--ease); }
.score-bar .score-val .score-max { color: rgba(255,255,255,.5); font-weight: 500; }
.score-bar #scoreVal { display: inline-block; transition: color 180ms var(--ease); }
.score-bar #scoreVal.animate { animation: scorePulse 300ms var(--ease); }
@keyframes scorePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); color: #93C5FD; } }

.outcomes { display: grid; gap: 10px; }
.outcomes .outcomes-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
.outcomes .outcomes-head h3 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.outcomes .count { font-size: 12px; color: var(--ink-3); }

.outcome {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0;
  overflow: hidden;
  transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease), transform 200ms var(--ease);
}
.outcome:hover { border-color: var(--ink-3); box-shadow: var(--shadow-xs); }
.outcome.open { box-shadow: var(--shadow-md); border-color: var(--ink-3); }

.outcome-trigger { display: flex; align-items: center; gap: 14px; width: 100%; border: 0; background: transparent; padding: 16px 18px; text-align: left; font: inherit; color: inherit; cursor: pointer; }
.outcome-trigger:active { transform: scale(.995); }
.outcome-trigger .title { flex: 1; font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
.outcome-trigger .chevron { color: var(--ink-3); transition: transform 220ms var(--spring); flex-shrink: 0; }
.outcome.open .outcome-trigger .chevron { transform: rotate(180deg); color: var(--ink); }

.outcome-body-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 280ms var(--ease); }
.outcome.open .outcome-body-wrap { grid-template-rows: 1fr; }
.outcome-body { overflow: hidden; }
.outcome-body-inner { padding: 4px 18px 18px 18px; border-top: 1px solid var(--border-2); opacity: 0; transform: translateY(-4px); transition: opacity 260ms var(--ease) 60ms, transform 260ms var(--ease) 60ms; }
.outcome.open .outcome-body-inner { opacity: 1; transform: translateY(0); padding-top: 14px; }
.outcome-body-inner p { margin: 0 0 8px 0; font-size: 14px; color: var(--ink); line-height: 1.6; }
.outcome-body-inner ul { margin: 0; padding-left: 20px; font-size: 14px; color: var(--ink); line-height: 1.65; }
.outcome-body-inner ul li { margin-bottom: 3px; }
.outcome-body-inner .actions { display: flex; justify-content: flex-end; margin-top: 16px; gap: 8px; }

.btn { padding: 10px 18px; border-radius: var(--r-md); font-size: 14px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: all 140ms var(--ease); display: inline-flex; align-items: center; gap: 8px; font-family: inherit; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-hover); }
.btn-ghost { background: transparent; color: var(--ink-2); border-color: var(--border); }
.btn-ghost:hover { color: var(--ink); border-color: var(--ink-3); }

.summary-hero { background: linear-gradient(135deg, var(--brand) 0%, #2C5EA0 100%); color: #fff; padding: 32px 28px; border-radius: var(--r-lg); margin-bottom: 24px; position: relative; overflow: hidden; }
.summary-hero::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at top right, rgba(255,255,255,.1), transparent 60%); pointer-events: none; }
.summary-hero .eyebrow { color: rgba(255,255,255,.7); }
.summary-hero h2 { margin: 4px 0 0 0; font-size: 28px; font-weight: 700; letter-spacing: -0.025em; }
.summary-hero p { margin: 10px 0 0 0; font-size: 14.5px; color: rgba(255,255,255,.85); max-width: 52ch; }
.summary-hero .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.summary-hero .btn-primary { background: #fff; color: var(--brand); }
.summary-hero .btn-primary:hover { background: rgba(255,255,255,.9); }
.summary-hero .btn-ghost { background: rgba(255,255,255,.1); color: #fff; border-color: rgba(255,255,255,.2); }
.summary-hero .btn-ghost:hover { background: rgba(255,255,255,.18); }

.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 24px; box-shadow: var(--shadow-xs); }
.summary-step { display: grid; grid-template-columns: 48px 1fr; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border-2); }
.summary-step:last-child { border-bottom: 0; }
.summary-step .num { width: 32px; height: 32px; border-radius: 50%; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; font-weight: 700; font-size: 13px; }
.summary-step .name { font-size: 14px; font-weight: 600; color: var(--ink); }
.summary-step .choice { font-size: 13px; color: var(--ink-2); margin-top: 4px; }

.article-reader { max-width: 720px; margin: 0 auto; }
.article-reader .tag { font-size: 11px; font-weight: 600; color: var(--brand); text-transform: uppercase; letter-spacing: 0.08em; }
.article-reader h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.03em; color: var(--ink); line-height: 1.15; margin: 10px 0 16px 0; }
.article-reader .article-meta { display: flex; gap: 16px; color: var(--ink-3); font-size: 13px; padding-bottom: 18px; border-bottom: 1px solid var(--border-2); margin-bottom: 28px; }
.article-reader p { font-size: 16px; line-height: 1.7; color: var(--ink); margin: 0 0 18px 0; }
.article-reader h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 32px 0 12px 0; color: var(--ink); }
.article-reader h3 { font-size: 18px; font-weight: 700; margin: 24px 0 10px 0; }
.article-reader ul, .article-reader ol { padding-left: 22px; }
.article-reader li { font-size: 16px; line-height: 1.7; color: var(--ink); margin-bottom: 6px; }
.article-reader img { max-width: 100%; height: auto; border-radius: var(--r-md); margin: 20px 0; }

.segment { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 3px; margin-bottom: 24px; box-shadow: var(--shadow-xs); }
.segment button { border: 0; background: transparent; padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--ink-2); cursor: pointer; transition: all 140ms var(--ease); font-family: inherit; }
.segment button.on { background: var(--ink); color: #fff; box-shadow: var(--shadow-xs); }
.segment button:hover:not(.on) { color: var(--ink); }

.hidden { display: none !important; }
.footnote { font-size: 12px; color: var(--ink-3); font-style: italic; margin-top: 24px; text-align: right; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: var(--ink-3); }
.loading .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 700ms linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-banner { background: #FEF3F2; border: 1px solid #FECDCA; color: #B42318; border-radius: var(--r-md); padding: 14px 16px; font-size: 14px; }

/* ---- Steps drawer ---- */
.topbar-steps-btn {
  position: relative;
  width: auto;
  min-width: 36px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 0 10px;
}
.topbar-steps-btn .steps-count {
  font-size: 11px; font-weight: 700; color: var(--ink-2);
  font-variant-numeric: tabular-nums;
}
.topbar-steps-btn[hidden] { display: none; }

.steps-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0);
  pointer-events: none;
  transition: background 240ms var(--ease);
  z-index: 99;
}
.steps-backdrop.open {
  background: rgba(0,0,0,0.4);
  pointer-events: auto;
}

.steps-drawer {
  position: fixed; top: 0; bottom: 0; left: 0;
  width: min(360px, 86vw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  transform: translateX(-100%);
  transition: transform 240ms var(--ease);
  z-index: 100;
  display: flex; flex-direction: column;
}
.steps-drawer.open { transform: translateX(0); }
.steps-drawer-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border-2);
}
.steps-drawer-head h2 {
  margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
  text-transform: uppercase; color: var(--ink-3);
}

.steps-list {
  list-style: none; counter-reset: step;
  margin: 0; padding: 8px;
  overflow-y: auto; flex: 1;
}
.steps-list li {
  counter-increment: step;
  margin: 0;
}
.steps-list .step-item {
  display: grid; grid-template-columns: 28px 1fr;
  gap: 10px; align-items: start;
  width: 100%;
  padding: 10px 12px;
  border: 0; background: transparent;
  font-family: inherit; font-size: 14px; text-align: left;
  color: var(--ink); cursor: pointer;
  border-radius: var(--r-md);
  transition: background 140ms var(--ease);
}
.steps-list .step-item:hover { background: var(--brand-softer); }
.steps-list .step-item:focus-visible {
  outline: 2px solid var(--brand); outline-offset: 2px;
}
.steps-list .step-item::before {
  content: counter(step) ".";
  font-variant-numeric: tabular-nums;
  font-weight: 600;
  color: var(--ink-3);
  text-align: right;
}
.steps-list .step-name { font-weight: 600; line-height: 1.3; }
.steps-list .step-choice {
  font-size: 13px; color: var(--ink-2);
  margin-top: 2px; line-height: 1.4;
}

.steps-list .step-item.current {
  background: var(--brand);
  color: #fff; cursor: default;
}
.steps-list .step-item.current::before { color: rgba(255,255,255,.7); }
.steps-list .step-item.current .step-choice { color: rgba(255,255,255,.85); }
.steps-list .step-item.current:hover { background: var(--brand); }
.steps-list .step-item.tentative { opacity: .55; }

/* Inline step indicator under algorithm title */
.algo-step-indicator {
  font-size: 12px; font-weight: 600;
  color: var(--ink-3);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 6px;
}

/* Print: never show drawer/backdrop */
@media print {
  .steps-drawer, .steps-backdrop, .topbar-steps-btn { display: none !important; }
}

@media (max-width: 480px) {
  .switch-row { padding: 10px 12px; }
  .switch-row .label-line { gap: 8px; margin-bottom: 8px; }
  .level-row { gap: 4px; }
  .level-btn { padding: 6px 10px; min-width: 40px; font-size: 12.5px; position: relative; }
  .level-btn::before {
    content: ''; position: absolute; inset: -8px -2px;
  }
}

/* ---- Triage handoff PDF ---- */
.pdf-doc { display: none; }

.pdf-cover { padding: 0 0 24px 0; border-bottom: 2px solid var(--ink); margin-bottom: 28px; }
.pdf-cover .brand-line { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.pdf-cover h1 { font-size: 28px; font-weight: 700; margin: 8px 0 6px; letter-spacing: -0.02em; }
.pdf-cover .generated { font-size: 12px; color: var(--ink-3); margin-bottom: 18px; }
.pdf-cover .writein { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; margin-bottom: 18px; }
.pdf-cover .writein label { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; font-weight: 600; }
.pdf-cover .writein .line { border-bottom: 1px solid var(--ink); height: 28px; }
.pdf-cover .final-rec { background: var(--brand-softer); border: 1px solid var(--brand); border-radius: var(--r-md); padding: 12px 16px; }
.pdf-cover .final-rec .lbl { font-size: 11px; color: var(--brand); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 4px; }
.pdf-cover .final-rec .rec { font-size: 15px; font-weight: 600; color: var(--ink); }

.pdf-step { padding: 28px 0; border-bottom: 1px solid var(--border); }
.pdf-step:first-of-type { padding-top: 0; }
.pdf-step:last-of-type { border-bottom: 0; padding-bottom: 16px; }
.pdf-step .step-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
.pdf-step .step-num { font-size: 12px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
.pdf-step h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }
.pdf-step .step-sub { font-size: 13px; color: var(--ink-2); margin: 0 0 20px 0; }
.pdf-step .algo-body { font-size: 13.5px; line-height: 1.65; color: var(--ink); margin: 0 0 20px 0; }
.pdf-step .algo-body p { margin: 0 0 12px 0; }
.pdf-step .algo-body p:last-child { margin-bottom: 0; }
.pdf-step .algo-body img { max-width: 100%; height: auto; margin: 8px 0; }
.pdf-step .algo-body ol, .pdf-step .algo-body ul { padding-left: 22px; margin: 0 0 14px 0; }
.pdf-step .algo-body li { margin-bottom: 6px; }

.pdf-qa { margin: 16px 0; border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; font-size: 12.5px; }
.pdf-qa table { width: 100%; border-collapse: collapse; }
.pdf-qa th { background: var(--surface-2); text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
.pdf-qa td { padding: 10px 12px; vertical-align: top; border-bottom: 1px solid var(--border-2); }
.pdf-qa tr:last-child td { border-bottom: 0; }
.pdf-qa .q-label { font-weight: 600; color: var(--ink); white-space: nowrap; }
.pdf-qa .q-desc { color: var(--ink-2); }
.pdf-qa .q-answer { font-weight: 600; color: var(--ink); white-space: nowrap; }
.pdf-qa .q-points { font-variant-numeric: tabular-nums; text-align: right; color: var(--ink-2); }
.pdf-qa .total-row td { background: var(--ink); color: #fff; font-weight: 700; font-size: 13px; padding: 10px 12px; }
.pdf-qa .total-row .q-points { color: #fff; }

.pdf-outcome { margin-top: 20px; padding: 16px 20px; background: var(--brand-soft); border-left: 3px solid var(--brand); border-radius: 0 var(--r-md) var(--r-md) 0; }
.pdf-outcome .lbl { font-size: 10px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.pdf-outcome h3 { font-size: 15px; font-weight: 700; color: var(--ink); margin: 0 0 8px 0; }
.pdf-outcome .body { font-size: 13px; line-height: 1.65; color: var(--ink); }
.pdf-outcome .body p { margin: 0 0 10px 0; }
.pdf-outcome .body p:last-child { margin-bottom: 0; }
.pdf-outcome .body ul, .pdf-outcome .body ol { padding-left: 20px; margin: 0 0 10px 0; }
.pdf-outcome .body li { margin-bottom: 4px; }
.pdf-outcome .body img { max-width: 100%; height: auto; }

.pdf-citations { margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--border); }
.pdf-citations .lbl { font-size: 10px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.pdf-citations ol { padding-left: 20px; margin: 0; font-size: 11.5px; color: var(--ink-2); line-height: 1.5; }
.pdf-citations li { margin-bottom: 3px; }

.pdf-end { text-align: center; padding: 16px 0 8px 0; font-size: 11px; color: var(--ink-3); border-top: 1px solid var(--border); margin-top: 20px; }

@media print {
  @page { size: letter; margin: 0.9in 0.85in 0.9in 0.85in; }

  html, body { background: #fff !important; color: var(--ink) !important; }
  .topbar, .summary-hero .actions, #backBtn { display: none !important; }
  .view { animation: none !important; }
  main.shell { max-width: none !important; padding: 0 !important; margin: 0 !important; }
  .summary-hero, .summary-card { display: none !important; }
  .pdf-doc { display: block !important; font-size: 11pt; }
  a { color: var(--ink) !important; text-decoration: none !important; }

  /* Preserve brand/fill backgrounds and inverse text in the handoff document */
  .pdf-doc, .pdf-doc * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  /* Let steps flow naturally; only protect key blocks from bad breaks */
  .pdf-step { page-break-inside: auto; break-inside: auto; }
  .pdf-step .step-head { page-break-after: avoid; break-after: avoid; }
  .pdf-qa, .pdf-outcome, .pdf-cover .final-rec {
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .pdf-step .algo-body img, .pdf-outcome .body img { break-inside: avoid; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <button class="back-btn" id="backBtn" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <div class="brand">
      <span class="brand-dot"></span>
      Stroke Mgmt
    </div>
    <div class="topbar-title" id="topbarTitle"></div>
    <div class="spacer"></div>
    <button class="icon-btn topbar-steps-btn" id="topbarStepsBtn" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="stepsDrawer" hidden>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span class="steps-count" id="topbarStepsCount"></span>
    </button>
    <button class="icon-btn" aria-label="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="icon-btn" aria-label="Menu">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
    </button>
  </div>
</div>

<main class="shell" id="main"></main>
<div class="steps-backdrop" id="stepsBackdrop" aria-hidden="true"></div>
<aside class="steps-drawer" id="stepsDrawer" role="dialog" aria-modal="true" aria-label="Treatment path steps" aria-hidden="true">
  <div class="steps-drawer-head">
    <h2>Your treatment path</h2>
    <button class="icon-btn" id="stepsCloseBtn" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"/></svg>
    </button>
  </div>
  <ol class="steps-list" id="stepsList"></ol>
</aside>

<script>
/* ================================================================
   CMS client — pulls from the same Strapi instance as the RN app
   ================================================================ */
const CMS = 'https://stroke-mgmt-cms.a2hosted.com';
const ALGO_POPULATE =
  'populate[0]=outcomes&populate[1]=switches&populate[2]=outcomes.criterion&populate[3]=outcomes.next&populate[4]=switches.levels&populate[5]=citations&populate[6]=Thumbnail';
const ARTICLE_POPULATE = 'populate[0]=tags&populate[1]=Thumbnail';

const state = {
  view: 'home',
  homeAlgos: [],
  articles: [],
  algoCache: {},
  placeholderImages: [],
  trail: [],
  currentAlgoId: null,
  currentAlgoScores: {},
  articleFilter: 'All',
};

const $ = (id) => document.getElementById(id);
const main = $('main');

/* ----- HTML entity decoder for title strings ----- */
const _decoder = document.createElement('textarea');
function decodeEntities(s) {
  if (!s) return '';
  _decoder.innerHTML = s;
  return _decoder.value;
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

/* ----- Network ----- */
async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Fetch failed: ${res.status} ${url}`);
  return res.json();
}
async function loadHomeAlgorithms() {
  const json = await fetchJson(
    `${CMS}/api/algorithms?filters[ShowOnHomeScreen]=true&${ALGO_POPULATE}`
  );
  return json.data;
}
async function loadAllArticles() {
  const json = await fetchJson(`${CMS}/api/articles?${ARTICLE_POPULATE}`);
  return json.data.filter((a) => a.attributes.Designation === 'Article');
}
async function loadAlgorithm(id) {
  if (state.algoCache[id]) return state.algoCache[id];
  const json = await fetchJson(`${CMS}/api/algorithms/${id}?${ALGO_POPULATE}`);
  state.algoCache[id] = json.data;
  return json.data;
}
// Matches the old app's StrapiPlaceholderImageRepository: pull the CMS-managed
// pool of clinical stock photos once, then deterministically pick one per
// record by hashing `${kind}-${id}`. Preserves the original UX where every
// card has a real photo even when the record itself has no Thumbnail uploaded.
async function loadPlaceholderImages() {
  const json = await fetchJson(`${CMS}/api/placeholder-image?populate=Images`);
  const imgs = (json.data && json.data.attributes && json.data.attributes.Images && json.data.attributes.Images.data) || [];
  return imgs.map((i) => {
    const a = i.attributes || {};
    const f = a.formats || {};
    const pick = f.small || f.medium || f.thumbnail || a;
    const url = pick.url || '';
    return url.startsWith('http') ? url : `${CMS}${url}`;
  }).filter(Boolean);
}

/* ----- Criterion matching (matches domain/models/Algorithm/Criterion) ----- */
function outcomeMatches(outcome, score) {
  const c = outcome.criterion;
  if (!c || c.Type === 'None' || c.Value == null) return true;
  if (c.Type === 'GreaterThan') return score > c.Value;
  if (c.Type === 'LessThan') return score < c.Value;
  if (c.Type === 'GreaterThanOrEqualTo') return score >= c.Value;
  if (c.Type === 'LessThanOrEqualTo') return score <= c.Value;
  return true;
}
function isScored(algo) { return (algo.attributes.switches || []).length > 0; }
function calcScore(algo) {
  const sc = state.currentAlgoScores[algo.id] || {};
  const sw = algo.attributes.switches || [];
  let total = 0;
  for (const s of sw) {
    const lv = sc[s.id];
    if (typeof lv === 'number') total += lv;
  }
  return total;
}
function calcMaxScore(algo) {
  const sw = algo.attributes.switches || [];
  let total = 0;
  for (const s of sw) {
    const levels = s.levels || [];
    if (levels.length === 0) continue;
    total += Math.max(...levels.map((l) => l.Value));
  }
  return total;
}
function allSwitchesSet(algo) {
  const sc = state.currentAlgoScores[algo.id] || {};
  return (algo.attributes.switches || []).every((s) => typeof sc[s.id] === 'number');
}

/* ----- Topbar chrome ----- */
function setTopbar(title) {
  $('topbarTitle').textContent = title || '';
  $('backBtn').style.display = state.view === 'home' ? 'none' : 'inline-flex';
}
function updateStepsAffordance(currentAlgo) {
  const btn = document.getElementById('topbarStepsBtn');
  const count = document.getElementById('topbarStepsCount');
  const totalSteps = state.trail.length + (currentAlgo && !state.trail.find((t) => t.algorithmId === currentAlgo.id) ? 1 : 0);
  if (totalSteps === 0) {
    btn.hidden = true;
    return;
  }
  btn.hidden = false;
  count.textContent = `· ${totalSteps}`;
}

function renderStepsList(currentAlgo) {
  const list = document.getElementById('stepsList');
  const currentIdx = currentAlgo
    ? state.trail.findIndex((t) => t.algorithmId === currentAlgo.id)
    : -1;
  const items = [];
  state.trail.forEach((s, i) => {
    const isCurrent = i === currentIdx;
    const isTentative = currentIdx >= 0 && i > currentIdx;
    const cls = `step-item ${isCurrent ? 'current' : ''} ${isTentative ? 'tentative' : ''}`.trim();
    if (isCurrent) {
      items.push(`<li><span class="${cls}" aria-current="step"><span><span class="step-name">${esc(s.algorithmTitle)}</span><span class="step-choice">Current</span></span></span></li>`);
    } else {
      items.push(`<li><button class="${cls}" type="button" data-step-idx="${i}"><span><span class="step-name">${esc(s.algorithmTitle)}</span><span class="step-choice">${esc(s.outcomeTitle)}</span></span></button></li>`);
    }
  });
  if (currentAlgo && currentIdx === -1) {
    const t = decodeEntities(currentAlgo.attributes.Title);
    items.push(`<li><span class="step-item current" aria-current="step"><span><span class="step-name">${esc(t)}</span><span class="step-choice">Current</span></span></span></li>`);
  }
  list.innerHTML = items.join('');
  list.querySelectorAll('.step-item[data-step-idx]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.stepIdx;
      const entry = state.trail[idx];
      if (!entry) return;
      closeStepsDrawer();
      goToAlgorithm(entry.algorithmId, { restoreFrom: entry });
    });
  });
}

function openStepsDrawer() {
  document.getElementById('stepsDrawer').classList.add('open');
  document.getElementById('stepsBackdrop').classList.add('open');
  document.getElementById('stepsDrawer').setAttribute('aria-hidden', 'false');
  document.getElementById('topbarStepsBtn').setAttribute('aria-expanded', 'true');
  // a11y: hide rest of page from AT while drawer is modal
  document.getElementById('main')?.setAttribute('aria-hidden', 'true');
  document.getElementById('stepsCloseBtn').focus();
}

function closeStepsDrawer() {
  document.getElementById('stepsDrawer').classList.remove('open');
  document.getElementById('stepsBackdrop').classList.remove('open');
  document.getElementById('stepsDrawer').setAttribute('aria-hidden', 'true');
  document.getElementById('topbarStepsBtn').setAttribute('aria-expanded', 'false');
  document.getElementById('main')?.removeAttribute('aria-hidden');
  document.getElementById('topbarStepsBtn').focus();
}
$('backBtn').addEventListener('click', () => {
  if (state.view === 'algorithm' && state.trail.length >= 1) {
    const last = state.trail.pop();
    goToAlgorithm(last.algorithmId);
    return;
  }
  renderHome();
});
document.getElementById('topbarStepsBtn').addEventListener('click', () => {
  if (document.getElementById('stepsDrawer').classList.contains('open')) {
    closeStepsDrawer();
  } else {
    openStepsDrawer();
  }
});
document.getElementById('stepsCloseBtn').addEventListener('click', closeStepsDrawer);
document.getElementById('stepsBackdrop').addEventListener('click', closeStepsDrawer);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('stepsDrawer').classList.contains('open')) {
    closeStepsDrawer();
  }
});

/* ================================================================
   View rendering
   ================================================================ */

function viewFrame(content) {
  main.innerHTML = `<div class="view">${content}</div>`;
}

function loadingFrame() {
  viewFrame(`<div class="loading"><div class="spinner"></div>Loading from CMS…</div>`);
}

function errorFrame(msg) {
  viewFrame(`<div class="error-banner">${esc(msg)}</div>`);
}

/* ---------- THUMBNAIL HELPERS ---------- */
// Resolves the Strapi Thumbnail URL for a record's `attributes` object,
// preferring the medium format, then small, then original. Returns null
// when the record has no Thumbnail uploaded.
function thumbUrl(att) {
  const img = att && att.Thumbnail && att.Thumbnail.data && att.Thumbnail.data.attributes;
  if (!img) return null;
  const fmt = (img.formats && (img.formats.medium || img.formats.small)) || img;
  const url = fmt.url;
  if (!url) return null;
  return url.startsWith('http') ? url : `${CMS}${url}`;
}

// Deterministic djb2 hash → same input always picks the same image.
// Non-cryptographic; adequate for "pick one of N placeholders" bucketing.
function hashString(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0;
  return h;
}

// Deterministic placeholder thumbnail. Picks from the CMS placeholder-image
// pool (populated at boot via loadPlaceholderImages) by hashing `${kind}-${id}`.
// Mirrors the old native app's StrapiPlaceholderImageRepository. If the pool
// is empty (network failure), returns an SVG gradient so cards still render.
function placeholderThumb(id, kind) {
  const pool = state.placeholderImages;
  if (pool && pool.length) {
    return pool[hashString(`${kind}-${id}`) % pool.length];
  }
  const n = Number(id) || 0;
  const hue = (n * 47) % 360;
  const hue2 = (hue + 40) % 360;
  const svg =
    `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 225'>` +
    `<defs><linearGradient id='g${n}' x1='0' y1='0' x2='1' y2='1'>` +
    `<stop offset='0' stop-color='hsl(${hue},60%,52%)'/>` +
    `<stop offset='1' stop-color='hsl(${hue2},55%,38%)'/>` +
    `</linearGradient></defs>` +
    `<rect width='400' height='225' fill='url(%23g${n})'/>` +
    `</svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

/* ---------- HOME ---------- */
async function renderHome() {
  state.view = 'home';
  updateStepsAffordance(null);
  state.currentAlgoId = null;
  setTopbar('');
  // Fresh fetch of home algos and articles if not loaded yet
  if (!state.homeAlgos.length || !state.articles.length) {
    loadingFrame();
    try {
      const [algos, arts, phImgs] = await Promise.all([
        state.homeAlgos.length ? state.homeAlgos : loadHomeAlgorithms(),
        state.articles.length ? state.articles : loadAllArticles(),
        state.placeholderImages.length ? state.placeholderImages : loadPlaceholderImages().catch(() => []),
      ]);
      state.homeAlgos = algos;
      state.articles = arts;
      state.placeholderImages = phImgs;
      // Seed algo cache so subsequent navigation is instant
      for (const a of algos) state.algoCache[a.id] = a;
    } catch (e) {
      errorFrame(`Couldn't reach the CMS: ${e.message}`);
      return;
    }
  }

  const tagSet = new Set(['All']);
  for (const a of state.articles) {
    for (const t of a.attributes.tags?.data || []) tagSet.add(t.attributes.Name);
  }
  const tags = [...tagSet];

  const triageCards = state.homeAlgos.map((a) => {
    const att = a.attributes;
    const scored = (att.switches || []).length > 0;
    const eyebrow = scored ? '▲ Scale-based' : '◆ Pathway';
    const thumb = thumbUrl(att) || placeholderThumb(a.id, scored ? 'algo-scored' : 'algo-path');
    return `
      <button class="pathway-card" data-algo-id="${a.id}">
        <img class="pathway-thumb" src="${thumb}" alt="" decoding="async">
        <div class="pathway-card-body">
          <div class="eyebrow">${eyebrow}</div>
          <h3>${esc(decodeEntities(att.Title))}</h3>
          <p>${esc(decodeEntities(att.Summary || ''))}</p>
          <div class="arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="meta">
            <span>${att.outcomes.length} outcome${att.outcomes.length === 1 ? '' : 's'}</span>
            ${scored ? `<span>·</span><span>${att.switches.length} score items</span>` : ''}
          </div>
        </div>
      </button>`;
  }).join('');

  const filterChips = tags.map((t) =>
    `<button class="chip ${t === state.articleFilter ? 'active' : ''}" data-tag="${esc(t)}">${esc(t)}</button>`
  ).join('');

  const visibleArticles = state.articles.filter((a) => {
    if (state.articleFilter === 'All') return true;
    return (a.attributes.tags?.data || []).some((t) => t.attributes.Name === state.articleFilter);
  });

  const articleCards = visibleArticles.map((a) => {
    const att = a.attributes;
    const firstTag = (att.tags?.data || [])[0]?.attributes?.Name || 'Article';
    const thumb = thumbUrl(att) || placeholderThumb(a.id, 'article');
    return `
      <button class="article-card" data-article-id="${a.id}">
        <img class="article-thumb" src="${thumb}" alt="" decoding="async">
        <div class="article-card-body">
          <span class="tag">${esc(firstTag)}</span>
          <h4>${esc(decodeEntities(att.Title))}</h4>
          <p>${esc(decodeEntities(att.Summary || '').slice(0, 180))}</p>
          <div class="read">Read →</div>
        </div>
      </button>`;
  }).join('') || `<p style="color:var(--ink-3);">No articles match this filter.</p>`;

  viewFrame(`
    <section>
      <div class="eyebrow">Decision Pathways</div>
      <h2 class="section-title">Build a triage</h2>
      <p class="section-sub">Start with an assessment pathway. The app walks you through each decision and keeps a running record of your triage.</p>
      <div class="pathways">${triageCards || `<p style="color:var(--ink-3);">No pathways found.</p>`}</div>
    </section>

    <hr class="home-sep" />

    <section>
      <div class="eyebrow">Reference</div>
      <h2 class="section-title">Library</h2>
      <p class="section-sub">Background, procedure demos, trial reviews, and case studies.</p>
      <div class="filter-row">${filterChips}</div>
      <div class="articles">${articleCards}</div>
    </section>
  `);

  wireHomeHandlers();
}

function wireHomeHandlers() {
  document.querySelectorAll('.pathway-card').forEach((c) => {
    c.addEventListener('click', () => {
      state.trail = [];
      goToAlgorithm(+c.dataset.algoId);
    });
  });
  document.querySelectorAll('.article-card').forEach((c) => {
    c.addEventListener('click', () => goToArticle(+c.dataset.articleId));
  });
  document.querySelectorAll('.chip[data-tag]').forEach((c) => {
    c.addEventListener('click', () => {
      state.articleFilter = c.dataset.tag;
      renderHome();
    });
  });
}

/* ---------- ALGORITHM ---------- */
async function goToAlgorithm(id, opts = {}) {
  state.view = 'algorithm';
  state.currentAlgoId = id;
  if (!state.currentAlgoScores[id]) state.currentAlgoScores[id] = {};
  loadingFrame();
  let algo;
  try { algo = await loadAlgorithm(id); } catch (e) { errorFrame(e.message); return; }

  if (opts.restoreFrom?.switchValues) {
    // Rehydrate the exact switch values from the saved trail entry.
    state.currentAlgoScores[id] = { ...opts.restoreFrom.switchValues };
  } else {
    // Default every switch to its lowest level so the score starts at 0.
    const sc = state.currentAlgoScores[id];
    for (const s of algo.attributes.switches || []) {
      if (!(s.id in sc) && s.levels?.length) {
        sc[s.id] = s.levels.reduce((m, l) => l.Value < m ? l.Value : m, s.levels[0].Value);
      }
    }
  }

  renderAlgorithm(algo, { restoreOutcomeId: opts.restoreFrom?.outcomeId });
}

function renderAlgorithm(algo, opts = {}) {
  const att = algo.attributes;
  const title = decodeEntities(att.Title);
  setTopbar(title);

  const scored = isScored(algo);
  const score = scored ? calcScore(algo) : 0;
  const lastUpdated = att.updatedAt ? new Date(att.updatedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) : '';

  const stepCurrentIdx = state.trail.findIndex((t) => t.algorithmId === algo.id);
  const stepNum = stepCurrentIdx >= 0 ? stepCurrentIdx + 1 : state.trail.length + 1;
  const totalSteps = stepCurrentIdx >= 0 ? state.trail.length : state.trail.length + 1;
  const stepIndicator = totalSteps > 1 ? `<div class="algo-step-indicator">Step ${stepNum} of ${totalSteps}</div>` : '';

  const switchesHTML = scored ? `
    <div class="switches">
      ${att.switches.map((s) => {
        const selected = state.currentAlgoScores[algo.id][s.id];
        const hasDesc = !!s.Description;
        return `
          <div class="switch-row" data-switch-id="${s.id}">
            <div class="label-line">
              <span class="lbl">${esc(decodeEntities(s.Label))}</span>
              ${hasDesc ? `<button class="info-toggle" type="button" aria-expanded="false" aria-label="Toggle description">ⓘ</button>` : ''}
            </div>
            ${hasDesc ? `
              <div class="desc-wrap">
                <div class="desc-inner">
                  <div class="desc">${s.Description}</div>
                </div>
              </div>
            ` : ''}
            <div class="level-row">
              ${s.levels.map((l) => `
                <button class="level-btn ${l.Value === selected ? 'selected' : ''}" data-level="${l.Value}">
                  ${esc(decodeEntities(l.Label))}
                </button>`).join('')}
            </div>
          </div>`;
      }).join('')}
    </div>

    <div class="score-bar">
      <div class="score-label">
        <div class="eyebrow">Severity</div>
        <div class="name" id="scoreInterpretation"></div>
      </div>
      <div class="score-val">
        <span id="scoreVal">${score}</span><span class="score-max"> / ${calcMaxScore(algo)}</span>
      </div>
    </div>
  ` : '';

  // Render every outcome upfront; for scored algorithms, hide the ones whose
  // criterion doesn't currently match. This way, raising switches can reveal
  // previously-hidden outcomes without re-rendering.
  const visibleCount = scored
    ? att.outcomes.filter((o) => outcomeMatches(o, score)).length
    : att.outcomes.length;

  const outcomesHTML = `
    <div class="outcomes">
      <div class="outcomes-head">
        <h3>${scored ? 'Recommended outcome' : 'Select the outcome that fits'}</h3>
        <span class="count">${visibleCount} of ${att.outcomes.length}</span>
      </div>
      ${att.outcomes.map((o) => {
        const vis = scored ? outcomeMatches(o, score) : true;
        return `
        <div class="outcome ${vis ? '' : 'hidden'}" data-outcome-id="${o.id}">
          <button class="outcome-trigger">
            <span class="title">${esc(decodeEntities(o.Title))}</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="outcome-body-wrap"><div class="outcome-body"><div class="outcome-body-inner">
            <div class="rich">${o.Body || ''}</div>
            <div class="actions">
              <button class="btn btn-primary" data-continue data-next="${o.next?.data?.id || ''}">
                ${o.next?.data?.id ? 'Continue' : 'Complete triage'}
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div></div></div>
        </div>`;
      }).join('')}
    </div>
  `;

  viewFrame(`
    <div class="algo-wrap">
      <div class="algo-header">
        <div class="eyebrow">${scored ? 'Scored pathway' : 'Text pathway'}</div>
        ${stepIndicator}
        <h1 class="algo-title">${esc(title)}</h1>
        <p class="algo-sub">${esc(decodeEntities(att.Summary || ''))}</p>
      </div>

      <div class="algo-body">${att.Body || ''}</div>

      ${switchesHTML}

      ${outcomesHTML}

      ${lastUpdated ? `<p class="footnote">Last updated ${lastUpdated}</p>` : ''}
    </div>
  `);

  updateStepsAffordance(algo);
  renderStepsList(algo);
  wireAlgorithmHandlers(algo, opts);
  rerenderOutcomesInPlace(algo);
  updateScoreInterpretation(algo);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function updateScoreInterpretation(algo) {
  if (!isScored(algo)) return;
  const score = calcScore(algo);
  const visible = algo.attributes.outcomes.filter((o) => outcomeMatches(o, score));
  const name = visible[0]?.Title ? decodeEntities(visible[0].Title) : '';
  const interp = $('scoreInterpretation');
  if (interp) interp.textContent = name;
  const scoreEl = $('scoreVal');
  if (scoreEl) {
    const prev = +scoreEl.textContent;
    scoreEl.textContent = score;
    if (prev !== score) {
      scoreEl.classList.remove('animate');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('animate');
    }
  }
}

function wireAlgorithmHandlers(algo, opts = {}) {
  // Level buttons
  document.querySelectorAll('.switch-row').forEach((row) => {
    const swId = +row.dataset.switchId;
    row.querySelectorAll('.level-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const v = +btn.dataset.level;
        state.currentAlgoScores[algo.id][swId] = v;
        row.querySelectorAll('.level-btn').forEach((b) => b.classList.remove('selected'));
        btn.classList.add('selected');
        updateScoreInterpretation(algo);
        rerenderOutcomesInPlace(algo);
      });
    });
  });

  // Description info toggles
  document.querySelectorAll('.switch-row .info-toggle').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const row = btn.closest('.switch-row');
      const open = row.classList.toggle('desc-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  });

  // Outcome expand
  wireOutcomeTriggers();

  // Continue button
  document.querySelectorAll('[data-continue]').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const card = btn.closest('.outcome');
      const outcomeId = +card.dataset.outcomeId;
      const att = algo.attributes;
      const outcome = att.outcomes.find((o) => o.id === outcomeId);
      const nextId = outcome?.next?.data?.id || null;

      const newEntry = {
        algorithmId: algo.id,
        algorithmTitle: decodeEntities(att.Title),
        outcomeId: outcome.id,
        outcomeTitle: decodeEntities(outcome.Title),
        score: isScored(algo) ? calcScore(algo) : null,
        switchValues: { ...(state.currentAlgoScores[algo.id] || {}) },
      };

      const existingIdx = state.trail.findIndex((t) => t.algorithmId === algo.id);
      if (existingIdx >= 0) {
        const prev = state.trail[existingIdx];
        const downstreamStillValid =
          prev.outcomeId === outcome.id &&
          state.trail[existingIdx + 1]?.algorithmId === nextId;
        state.trail[existingIdx] = newEntry;
        if (!downstreamStillValid) {
          state.trail = state.trail.slice(0, existingIdx + 1);
        }
      } else {
        state.trail.push(newEntry);
      }

      if (nextId) goToAlgorithm(nextId);
      else showSummary();
    });
  });

  document.querySelectorAll('.crumb[data-crumb-idx]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.crumbIdx;
      const entry = state.trail[idx];
      if (!entry) return;
      // Don't truncate here; keep the full trail so the user sees their
      // walked path. The Continue handler (Task 5) decides whether to
      // preserve downstream (same choice) or truncate (different choice).
      goToAlgorithm(entry.algorithmId, { restoreFrom: entry });
    });
  });

  // Auto-expand the outcome that was previously chosen, if we're restoring.
  if (opts.restoreOutcomeId) {
    const card = document.querySelector(
      `.outcome[data-outcome-id="${opts.restoreOutcomeId}"]`
    );
    if (card && !card.classList.contains('hidden')) {
      card.classList.add('open');
      scrollExpandedIntoView(card);
    }
  }
}

function rerenderOutcomesInPlace(algo) {
  const score = calcScore(algo);
  const visible = algo.attributes.outcomes.filter((o) => outcomeMatches(o, score));
  const container = document.querySelector('.outcomes');
  if (!container) return;
  const countEl = container.querySelector('.count');
  if (countEl) countEl.textContent = `${visible.length} of ${algo.attributes.outcomes.length}`;
  container.querySelectorAll('.outcome').forEach((card) => {
    const id = +card.dataset.outcomeId;
    const vis = visible.some((o) => o.id === id);
    card.classList.toggle('hidden', !vis);
    if (!vis) card.classList.remove('open');
  });
  if (isScored(algo) && !container.querySelector('.outcome:not(.hidden).open')) {
    const first = container.querySelector('.outcome:not(.hidden)');
    if (first) first.classList.add('open');
  }
}

function wireOutcomeTriggers() {
  document.querySelectorAll('.outcome-trigger').forEach((t) => {
    t.addEventListener('click', () => {
      const card = t.closest('.outcome');
      const wasOpen = card.classList.contains('open');
      card.parentElement.querySelectorAll('.outcome.open').forEach((o) => o.classList.remove('open'));
      if (!wasOpen) {
        card.classList.add('open');
        scrollExpandedIntoView(card);
      }
    });
  });
}

function renderPdfDoc() {
  if (state.trail.length === 0) return '';

  const last = state.trail[state.trail.length - 1];
  const genDate = new Date().toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit',
  });

  const cover = `
    <div class="pdf-cover">
      <div class="brand-line">Stroke Mgmt · Triage Record</div>
      <h1>Triage Handoff</h1>
      <div class="generated">Generated ${esc(genDate)}</div>
      <div class="writein">
        <div><label>Patient identifier</label><div class="line"></div></div>
        <div><label>Date / time of triage</label><div class="line"></div></div>
        <div><label>Clinician name</label><div class="line"></div></div>
        <div><label>Signature</label><div class="line"></div></div>
      </div>
      <div class="final-rec">
        <div class="lbl">Final recommendation</div>
        <div class="rec">${esc(last.outcomeTitle)} <span style="color:var(--ink-3);font-weight:500;">(from ${esc(last.algorithmTitle)})</span></div>
      </div>
    </div>
  `;

  const stepsHTML = state.trail.map((s, i) => renderPdfStep(s, i)).join('');

  return `
    <div class="pdf-doc" aria-hidden="true">
      ${cover}
      ${stepsHTML}
      <div class="pdf-end">End of triage record</div>
    </div>
  `;
}

function renderPdfStep(trailEntry, i) {
  const algo = state.algoCache[trailEntry.algorithmId];
  if (!algo) {
    return `
      <div class="pdf-step">
        <div class="step-head">
          <span class="step-num">Step ${i + 1}</span>
          <h2>${esc(trailEntry.algorithmTitle)}</h2>
        </div>
        <p class="step-sub">${esc(trailEntry.outcomeTitle)}</p>
      </div>
    `;
  }

  const att = algo.attributes;
  const title = decodeEntities(att.Title);
  const summary = decodeEntities(att.Summary || '');
  const scored = isScored(algo);
  const score = trailEntry.score;

  const outcome = (att.outcomes || []).find((o) => o.id === trailEntry.outcomeId);

  const qaBlock = scored ? `
    <div class="pdf-qa">
      <table>
        <thead>
          <tr>
            <th style="width: 20%;">Question</th>
            <th>Assessment criterion</th>
            <th style="width: 22%;">Answer</th>
            <th style="width: 8%; text-align: right;">Points</th>
          </tr>
        </thead>
        <tbody>
          ${(att.switches || []).map((sw) => {
            const chosenValue = trailEntry.switchValues?.[sw.id];
            const chosenLevel = (sw.levels || []).find((l) => l.Value === chosenValue);
            const answerLabel = chosenLevel
              ? `${chosenLevel.Value} — ${decodeEntities(chosenLevel.Label)}`
              : '—';
            return `
              <tr>
                <td class="q-label">${esc(decodeEntities(sw.Label))}</td>
                <td class="q-desc">${sw.Description ? sw.Description : ''}</td>
                <td class="q-answer">${esc(answerLabel)}</td>
                <td class="q-points">${chosenValue != null ? chosenValue : '—'}</td>
              </tr>
            `;
          }).join('')}
          <tr class="total-row">
            <td colspan="3">Total score</td>
            <td class="q-points">${score != null ? score : '—'}</td>
          </tr>
        </tbody>
      </table>
    </div>
  ` : '';

  const outcomeBlock = `
    <div class="pdf-outcome">
      <div class="lbl">Decision</div>
      <h3>${esc(decodeEntities(outcome?.Title || trailEntry.outcomeTitle))}</h3>
      <div class="body">${outcome?.Body || ''}</div>
    </div>
  `;

  const citations = (att.citations || []);
  const citationsBlock = citations.length ? `
    <div class="pdf-citations">
      <div class="lbl">Citations</div>
      <ol>${citations.map((c) => `<li>${esc(c.Citation)}</li>`).join('')}</ol>
    </div>
  ` : '';

  return `
    <div class="pdf-step">
      <div class="step-head">
        <span class="step-num">Step ${i + 1}</span>
        <h2>${esc(title)}</h2>
      </div>
      ${summary ? `<p class="step-sub">${esc(summary)}</p>` : ''}
      <div class="algo-body">${att.Body || ''}</div>
      ${qaBlock}
      ${outcomeBlock}
      ${citationsBlock}
    </div>
  `;
}

async function exportHandoffPdf() {
  const pdfDoc = document.querySelector('.pdf-doc');
  const btn = document.getElementById('printBtn');
  if (!pdfDoc) return;
  if (typeof html2pdf === 'undefined') {
    alert('PDF library still loading — please try again in a moment.');
    return;
  }

  // html2canvas produces a 0-height capture when the source element has
  // position:fixed/absolute. Workaround: clone with default block layout and
  // place it inside an off-screen wrapper instead.
  const clone = pdfDoc.cloneNode(true);
  clone.setAttribute('style', 'display: block; width: 672px; background: #fff; color: #0B1220;');
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position: absolute; left: -20000px; top: 0;';
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  const priorBtnLabel = btn ? btn.textContent : null;
  if (btn) { btn.textContent = 'Generating PDF…'; btn.disabled = true; }

  try {
    await html2pdf().set({
      margin: [0.75, 0.75, 0.85, 0.75],
      filename: 'Triage Handoff.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        logging: false,
        backgroundColor: '#ffffff',
      },
      jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait', compress: true },
      pagebreak: {
        mode: ['css', 'legacy'],
        avoid: ['.pdf-qa', '.pdf-outcome', '.pdf-cover .final-rec'],
      },
    }).from(clone).save();
  } catch (err) {
    console.error('PDF export failed:', err);
    alert('PDF export failed: ' + (err && err.message ? err.message : err));
  } finally {
    wrapper.remove();
    if (btn) { btn.textContent = priorBtnLabel; btn.disabled = false; }
  }
}

/* ---------- SUMMARY ---------- */
function showSummary() {
  state.view = 'summary';
  updateStepsAffordance(null);
  setTopbar('Triage Summary');
  const steps = state.trail.map((s, i) => `
    <div class="summary-step">
      <div class="num">${i + 1}</div>
      <div>
        <div class="name">${esc(s.algorithmTitle)}${s.score != null ? ` <span style="color:var(--ink-3);font-weight:500;">· score ${s.score}</span>` : ''}</div>
        <div class="choice">${esc(s.outcomeTitle)}</div>
      </div>
    </div>
  `).join('');

  const pdfHTML = renderPdfDoc();

  viewFrame(`
    <div class="summary-hero">
      <div class="eyebrow">Triage complete</div>
      <h2>Your triage is ready</h2>
      <p>Review the decisions you made below. This is your stroke triage record for the current patient. You can start over at any time.</p>
      <div class="actions">
        <button class="btn btn-primary" id="printBtn">Export PDF</button>
        <button class="btn btn-ghost" id="startOverBtn">Start new triage</button>
      </div>
    </div>
    <div class="summary-card">${steps || '<p style="color:var(--ink-3);">No decisions recorded.</p>'}</div>
    ${pdfHTML}
  `);

  $('printBtn').addEventListener('click', () => exportHandoffPdf());
  $('startOverBtn').addEventListener('click', () => {
    state.trail = [];
    state.currentAlgoScores = {};
    renderHome();
  });
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ---------- ARTICLE ---------- */
async function goToArticle(id) {
  state.view = 'article';
  updateStepsAffordance(null);
  setTopbar('Article');
  const found = state.articles.find((a) => a.id === id);
  if (!found) { errorFrame('Article not found.'); return; }
  const att = found.attributes;
  const tag = (att.tags?.data || [])[0]?.attributes?.Name || 'Article';
  const lastUpdated = att.updatedAt ? new Date(att.updatedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) : '';

  viewFrame(`
    <div class="article-reader">
      <span class="tag">${esc(tag)}</span>
      <h1>${esc(decodeEntities(att.Title))}</h1>
      <div class="article-meta">
        ${att.Summary ? `<span>${esc(decodeEntities(att.Summary))}</span><span>·</span>` : ''}
        <span>Updated ${lastUpdated}</span>
      </div>
      <div>${att.Body || ''}</div>
    </div>
  `);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ---------- Scroll helper ---------- */
function smoothScrollTo(targetY, duration) {
  const startY = window.scrollY;
  const delta = targetY - startY;
  if (Math.abs(delta) < 2) return;
  const startT = performance.now();
  function step(now) {
    const t = Math.min(1, (now - startT) / duration);
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    window.scrollTo(0, startY + delta * eased);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function scrollExpandedIntoView(card) {
  const topbarH = document.querySelector('.topbar').getBoundingClientRect().height;
  const vh = window.innerHeight;
  setTimeout(() => {
    const rect = card.getBoundingClientRect();
    let target = null;
    if (rect.bottom > vh - 16) target = window.scrollY + (rect.bottom - vh) + 24;
    else if (rect.top < topbarH + 12) target = window.scrollY + rect.top - topbarH - 12;
    if (target != null) {
      const max = document.documentElement.scrollHeight - vh;
      target = Math.max(0, Math.min(target, max));
      smoothScrollTo(target, 360);
    }
  }, 300);
}

/* ---------- Boot ---------- */
renderHome();
